; https://docs.platformio.org/page/projectconf.html


[env:esp32cam]
framework = arduino
monitor_speed = 115200
upload_speed = 921600
platform = espressif32
board = esp32cam
board_build.mcu = esp32
board_build.f_cpu = 240000000L
monitor_dtr = 0
monitor_rts = 0 
lib_deps = 
